<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <title>Statistik Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1><u><!--🔧--> Statistik Board</h1></u>
        
        <div style="margin-bottom: 30px; margin-top: 30px;">
            <label for="zeitraum">Zeitraum:</label>
            <select id="zeitraum" name="zeitraum" style="padding: 8px 12px; font-size: 16px; border-radius: 5px;">
                <option value="heute">Heute</option>
                <option value="woche">Diese Woche</option>
                <option value="monat">Dieser Monat</option>
                <option value="jahr">Dieses Jahr</option>
            </select>
        </div>

        <div class="chart-container" style="border: 2px solid #333; padding: 20px; border-radius: 8px;">
            <div class="chart-item">
                <label class="chart-label"><u>Pizzen:</u> 120 Verkäufe</label>
                <div class="chart-bar-wrapper" style="width: 100%;">
                    <div class="chart-bar chart-bar-pizza" style="width: 100%;"></div>
                </div>
            </div>
            <div class="chart-item">
                <label class="chart-label"><u>Asia:</u> 30 Verkäufe</label>
                <div class="chart-bar-wrapper" style="width: 25%;">
                    <div class="chart-bar chart-bar-asia" style="width: 100%;"></div>
                </div>
            </div>
            <div class="chart-item">
                <label class="chart-label"><u>Getränke:</u> 24 Verkäufe</label>
                <div class="chart-bar-wrapper" style="width: 20%;">
                    <div class="chart-bar chart-bar-drinks" style="width: 100%;"></div>
                </div>
            </div>
        </div>
         <button onclick="goToPage('admin_index.html')">Zurück</button>
    </div>
       
    </div>



        <script src="script.js"></script>
</body>

</html>
